#cloud-config
# Base developer prereqs for lab VMs. Applied via the `base-ubuntu` LXD profile
# (lab.sh profile-apply). Arch-aware Miniforge install -> /opt/conda.
# __LAB_VM_USER__ / __LAB_VM_PASSWORD__ are substituted from .env at profile-apply
# time (no secret committed). Enables LAN password SSH; the eth1 macvlan NIC that
# gives the VM a LAN IP is added to the profile by lab.sh, not here.
package_update: true
package_upgrade: false
packages:
  - python3
  - python3-pip
  - python3-venv
  - build-essential
  - git
  - curl
  - ca-certificates
ssh_pwauth: true
users:
  - default
  - name: __LAB_VM_USER__
    groups: [sudo]
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    shell: /bin/bash
    lock_passwd: false
    plain_text_passwd: "__LAB_VM_PASSWORD__"
write_files:
  - path: /etc/profile.d/conda.sh
    content: |
      export PATH=/opt/conda/bin:$PATH
  # Sorts before 60-cloudimg-settings.conf so password auth wins (sshd uses
  # the first value found across the included drop-ins).
  - path: /etc/ssh/sshd_config.d/00-lab-ssh.conf
    content: |
      PasswordAuthentication yes
  # LXD adds the eth1 macvlan NIC but the image's netplan only DHCPs the primary
  # interface; this brings up the extra en* NIC (the LAN one) so the VM gets a LAN IP.
  - path: /usr/local/sbin/lab-lan-up.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      # Bring up the extra LAN NIC (macvlan) with DHCP. Matches both VM names
      # (enp5s0/enp6s0 — biosdevname) and container names (eth0/eth1). Sets
      # dhcp4-overrides.route-metric: 50 so the LAN NIC's default route wins
      # over lxdbr0's (both DHCP defaults arrive at metric 100 otherwise, and
      # the kernel picks lxdbr0 — which is blocked behind the host's FORWARD
      # chain when Docker is installed).
      for i in $(ls /sys/class/net | grep -E '^(en|eth)'); do
        if ! ip -4 addr show "$i" | grep -q 'inet '; then
          printf 'network:\n  version: 2\n  ethernets:\n    %s:\n      dhcp4: true\n      dhcp4-overrides:\n        route-metric: 50\n      optional: true\n' "$i" > /etc/netplan/99-lab-lan.yaml
          chmod 600 /etc/netplan/99-lab-lan.yaml
          netplan apply
          break
        fi
      done
runcmd:
  - [ bash, -lc, "test -x /opt/conda/bin/conda || { A=$(uname -m); curl -fsSL https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-${A}.sh -o /tmp/mf.sh && bash /tmp/mf.sh -b -p /opt/conda && rm -f /tmp/mf.sh; }" ]
  - [ bash, -lc, "ln -sf /opt/conda/bin/conda /usr/local/bin/conda" ]
  - [ bash, -lc, "/usr/local/sbin/lab-lan-up.sh" ]
